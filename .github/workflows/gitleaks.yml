name: gitleaks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  scan:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so gitleaks can scan every commit, not just HEAD.
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Free OSS license at https://gitleaks.io
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
